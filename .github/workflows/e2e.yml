name: E2E Tests (Patrol)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Backend image tag to test'
        required: false
        default: 'latest'
  repository_dispatch:
    types: [run-e2e]

jobs:
  e2e-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || github.event.client_payload.image_tag || 'latest' }}"
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - name: Start backend stack
        run: IMAGE_TAG=${{ steps.tag.outputs.value }} docker compose up -d --wait
        timeout-minutes: 5

      - name: Set up Java (Android build tools)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.x'
          channel: stable
          cache: true

      - name: Install patrol_cli
        run: dart pub global activate patrol_cli

      - name: Flutter pub get
        run: flutter pub get

      - name: Run Patrol E2E tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            patrol test \
              --dart-define=API_BASE_URL=http://10.0.2.2 \
              --dart-define=WS_URL=http://10.0.2.2 \
              --verbose

      - name: Upload Patrol report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patrol-report
          path: build/app/outputs/patrol/
          retention-days: 14

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down backend
        if: always()
        run: docker compose down -v
