name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to test'
        required: false
        default: 'latest'
  repository_dispatch:
    types: [run-e2e]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || github.event.client_payload.image_tag || 'latest' }}"
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - name: Start stack
        run: IMAGE_TAG=${{ steps.tag.outputs.value }} docker compose up -d --wait
        timeout-minutes: 5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          server-id: github-packages
          server-username: GITHUB_ACTOR
          server-password: PACKAGES_TOKEN

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            !~/.m2/repository/com/plantogether
          key: m2-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            m2-${{ runner.os }}-

      - name: Run E2E tests
        run: mvn -s .settings.xml --batch-mode verify
        env:
          E2E_BASE_URL: http://localhost
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: target/failsafe-reports/
          retention-days: 14

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
