name: plantogether-e2e

# IMAGE_TAG is passed as an environment variable (default: latest).
# Usage: IMAGE_TAG=1.2.3 docker compose up -d

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: plantogether
      POSTGRES_PASSWORD: plantogether
      POSTGRES_DB: plantogether_trip
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantogether -d plantogether_trip"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - plantogether-e2e

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - plantogether-e2e

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - plantogether-e2e

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------

  trip-service:
    image: ghcr.io/teruelplan/plantogether-trip-service:${IMAGE_TAG:-latest}
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: plantogether_trip
      DB_USER: plantogether
      DB_PASSWORD: plantogether
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - plantogether-e2e

  poll-service:
    image: ghcr.io/teruelplan/plantogether-poll-service:${IMAGE_TAG:-latest}
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: plantogether_poll
      DB_USER: plantogether
      DB_PASSWORD: plantogether
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TRIP_SERVICE_GRPC_HOST: trip-service
      TRIP_SERVICE_GRPC_PORT: 9081
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - plantogether-e2e

  destination-service:
    image: ghcr.io/teruelplan/plantogether-destination-service:${IMAGE_TAG:-latest}
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: plantogether_destination
      DB_USER: plantogether
      DB_PASSWORD: plantogether
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TRIP_SERVICE_GRPC_HOST: trip-service
      TRIP_SERVICE_GRPC_PORT: 9081
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - plantogether-e2e

  expense-service:
    image: ghcr.io/teruelplan/plantogether-expense-service:${IMAGE_TAG:-latest}
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: plantogether_expense
      DB_USER: plantogether
      DB_PASSWORD: plantogether
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TRIP_SERVICE_GRPC_HOST: trip-service
      TRIP_SERVICE_GRPC_PORT: 9081
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - plantogether-e2e

  task-service:
    image: ghcr.io/teruelplan/plantogether-task-service:${IMAGE_TAG:-latest}
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: plantogether_task
      DB_USER: plantogether
      DB_PASSWORD: plantogether
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TRIP_SERVICE_GRPC_HOST: trip-service
      TRIP_SERVICE_GRPC_PORT: 9081
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - plantogether-e2e

  chat-service:
    image: ghcr.io/teruelplan/plantogether-chat-service:${IMAGE_TAG:-latest}
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: plantogether_chat
      DB_USER: plantogether
      DB_PASSWORD: plantogether
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TRIP_SERVICE_GRPC_HOST: trip-service
      TRIP_SERVICE_GRPC_PORT: 9081
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - plantogether-e2e

  file-service:
    image: ghcr.io/teruelplan/plantogether-file-service:${IMAGE_TAG:-latest}
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: plantogether_file
      DB_USER: plantogether
      DB_PASSWORD: plantogether
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TRIP_SERVICE_GRPC_HOST: trip-service
      TRIP_SERVICE_GRPC_PORT: 9081
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - plantogether-e2e

  # ---------------------------------------------------------------------------
  # notification-service is intentionally excluded from E2E:
  # it requires FCM credentials that are not available in CI.
  # ---------------------------------------------------------------------------

networks:
  plantogether-e2e:
    driver: bridge
